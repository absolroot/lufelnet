<script>
(function () {
    var params = new URLSearchParams(window.location.search || '');
    var path = String(window.location.pathname || '/');
    var lowerPath = path.toLowerCase();

    var pathLangMatch = lowerPath.match(/^\/(kr|en|jp|cn)(\/|$)/);
    var pathLang = pathLangMatch ? pathLangMatch[1] : '';
    var queryLang = String(params.get('lang') || '').toLowerCase();
    var preferredLang = '';

    if (pathLang) {
        preferredLang = pathLang;
    } else if (['kr', 'en', 'jp', 'cn'].indexOf(queryLang) !== -1) {
        preferredLang = queryLang;
    } else {
        try {
            preferredLang = String(localStorage.getItem('preferredLanguage') || '').toLowerCase();
        } catch (_) {
            preferredLang = '';
        }
        if (['kr', 'en', 'jp', 'cn'].indexOf(preferredLang) === -1) {
            preferredLang = 'kr';
        }
    }

    var isLegacyRoot = /^\/share\/character\/?$/.test(lowerPath);
    var isCanonicalPath = /^\/(kr|en|jp|cn)\/share\/character\/?$/.test(lowerPath);

    if (isLegacyRoot) {
        window.__SEO_PATH_LANG__ = preferredLang;
        params.delete('lang');
        params.delete('v');
        var legacyRemaining = params.toString();
        history.replaceState(null, '', '/' + preferredLang + '/share/character/' + (legacyRemaining ? '?' + legacyRemaining : ''));
        return;
    }

    if (isCanonicalPath) {
        window.__SEO_PATH_LANG__ = pathLang;
        var before = params.toString();
        params.delete('lang');
        params.delete('v');
        var canonicalRemaining = params.toString();
        var canonicalPath = '/' + pathLang + '/share/character/';
        if (path !== canonicalPath || before !== canonicalRemaining) {
            history.replaceState(null, '', canonicalPath + (canonicalRemaining ? '?' + canonicalRemaining : ''));
        }
    }
})();
</script>
